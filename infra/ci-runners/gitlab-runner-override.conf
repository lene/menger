# Drop-in for gitlab-runner.service (menger Sprint 28.3).
# Installed to /etc/systemd/system/gitlab-runner.service.d/override.conf.
# Joins the CI resource slice (caps the runner process; job containers are
# capped via docker cpus/memory in config.toml — see README.md).
# Restart=always is already set by the vendor unit.
[Service]
Slice=ci-runners.slice

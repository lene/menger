# Drop-in for the GitHub Actions runner service (menger Sprint 28.3).
# Installed to /etc/systemd/system/<actions.runner...>.service.d/override.conf.
# Joins the CI resource slice (jobs are child processes, so the caps apply to
# them too) and adds the missing restart-on-failure behavior.
[Service]
Slice=ci-runners.slice
Restart=on-failure
RestartSec=10

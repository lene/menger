stages:
  - preconditions
  - review
  - check
  - test
  - build
  - test built
  - package
  - release

# Global defaults for all jobs
default:
  timeout: 15m
  retry: 2
  interruptible: true

variables:
  DEPLOYABLE_BASE_NAME: menger
  DEPLOYABLE_VERSION: 0.7.8
  DOCKER_IMAGE: registry.gitlab.com/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}/server
  SCALA_VERSION: 3.8.3
  LIBAV_DEV_PACKAGES: "libavcodec-dev libavformat-dev libavutil-dev libswscale-dev"
  # OptiX Docker image version: {CUDA}-{OptiX}-{Java}-{sbt}. CUDA 13 only — the published
  # optix-jni artifact and menger-geometry native libs link the CUDA 13 runtime.
  OPTIX_DOCKER_VERSION: 13.2-9.0-25-1.12.0
  # OptiX uses CUDA driver libraries; Xvfb/Mesa provide headless GL for LibGDX tests.
  # Do not request the NVIDIA graphics capability here: it makes nvidia-container-runtime
  # mount host EGL/GL sidecar libraries by exact filename, which is not portable across
  # runner driver/package revisions.
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  # Workaround for SIGBUS crash in libnvidia-glcore.so during glfwDestroyWindow
  # See: https://forums.developer.nvidia.com/t/crash-on-launching-game-with-plasma-problematic-frame-libnvidia-glcore-so-570-144-0xa5966c/332304
  __GL_THREADED_OPTIMIZATIONS: "0"
  # Java module options configured in .sbtopts (applies to both local and CI builds)
  # JAVA_OPTS and SBT_OPTS removed - they conflict with .sbtopts causing option duplication

include:
  - template: Code-Quality.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Control when pipelines are created to ensure:
# - MR pipelines run for merge requests
# - Tag pipelines run for tags (triggered by CreateRelease)
# - Main branch pipelines run after MR merge (for CreateRelease job)
# - Feature branch pipelines are skipped when MR is open (avoid duplicates)
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

# Override code_quality from template to use compatible Docker versions
# Docker 27.x supports API 1.46, ensuring compatibility with DinD service
# Code quality is also validated by scalafix in pre-push hooks and semgrep-sast job.
code_quality:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  timeout: 30m
  retry:
    max: 2
    when:
      - stuck_or_timeout_failure
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Full test suite — runs ONLY on MR pipelines (the authoritative quality gate).
# GPU-required: serialized on the single self-hosted NVIDIA runner.
# Uses pre-built Docker image with CUDA, OptiX, Java 25, and sbt.
#
# Skipped for merge-to-main and tag pipelines — GPU tests were already validated
# when the MR passed.  Only BuildDeployable and release jobs run downstream.
Test:Full:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  timeout: 20m
  retry: 2
  tags:
    - nvidia
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  rules:
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\\//'
      allow_failure: true
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.scala"
        - "**/*.sbt"
        - "**/*.cpp"
        - "**/*.cu"
        - "**/*.cuh"
        - "**/*.h"
        - "**/CMakeLists.txt"
        - ".gitlab-ci.yml"
        - "scripts/integration-tests.sh"
        - "project/**/*"
  before_script:
    # Verify GPU is available - fail fast if not configured
    - nvidia-smi
    # Create missing symlink for RTX core library if needed (OptiX looks for .so.1)
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    # Update library cache
    - ldconfig || true
    # Install xvfb for headless LibGDX tests
    - apt-get -y update
    - apt-get -y install --no-install-recommends mesa-utils x11-xserver-utils xvfb $LIBAV_DEV_PACKAGES
  script:
    # Run full parent test suite. Standalone optix-jni tests run in lene/optix-jni.
    # Java 25, sbt, CUDA 13.2, and OptiX SDK 9.0 are pre-installed in the Docker image
    - xvfb-run sbt test
  after_script:
    # Fix permissions on generated files so they can be cleaned up locally without sudo
    # Docker containers run as root, creating root-owned files that cause permission issues
    - chmod -R 777 menger-app/target/ || true
  artifacts:
    when: always
    reports:
      junit: menger-app/target/test-reports/**/TEST-*.xml

# OptiX integration tests — comprehensive CLI and rendering tests (MR only).
# Uses scripts/integration-tests.sh for packaged-app render coverage.
Test:OptiXIntegration:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  tags:
    - nvidia
  timeout: 30m
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    __GL_THREADED_OPTIMIZATIONS: "0"
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.scala"
        - "**/*.sbt"
        - "**/*.cpp"
        - "**/*.cu"
        - "**/*.cuh"
        - "**/*.h"
        - "**/CMakeLists.txt"
        - ".gitlab-ci.yml"
        - "scripts/integration-tests.sh"
        - "scripts/reference-images/**"
        - "project/**/*"
  before_script:
    # Verify GPU is available - fail fast if not configured
    - nvidia-smi
    - apt-get -y update
    - apt-get -y install --no-install-recommends mesa-utils x11-xserver-utils xvfb unzip imagemagick $LIBAV_DEV_PACKAGES
    # Create missing symlink for RTX core library if needed
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    # Build packaged distribution
    - sbt "mengerApp / Universal / packageBin"
    - VERSION=$(grep 'version :=' menger-app/build.sbt | cut -d '"' -f 2)
    - unzip -oq ./menger-app/target/universal/menger-app-${VERSION}.zip
    - export LD_LIBRARY_PATH=/usr/local/cuda/lib64
    # Run comprehensive integration tests (27 scenarios)
    - ./scripts/integration-tests.sh ./menger-app-${VERSION}/bin/menger-app
  after_script:
    # Clean up permissions for Docker artifacts
    - chmod -R 777 menger-app/target/ || true

# Coverage check with ratchet mechanism:
# - Fails if coverage drops more than 1% AND is below 80%
# - Fails if coverage drops below absolute floor of 60%
# - Warns (but doesn't fail) if coverage drops but stays above 80%
CheckCoverage:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  variables:
    COVERAGE_DROP_THRESHOLD: "1.0"
    COVERAGE_MIN: "80"
    COVERAGE_FLOOR: "60"
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.scala"
        - "**/*.sbt"
        - "project/**/*"
  before_script:
    - apt-get -y update
    - apt-get -y install --no-install-recommends bc mesa-utils x11-xserver-utils xvfb curl $LIBAV_DEV_PACKAGES
  script:
    # Fetch previous coverage from artifacts (if available)
    - 'curl -o coverage.log --location --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/coverage.log?job=${CI_JOB_NAME}"'
    - . coverage.log || true
    - statement_rate_old=${statement_rate:-0}
    - branch_rate_old=${branch_rate:-0}
    # Run tests with coverage
    - sbt clean
    - xvfb-run sbt coverage test || true
    - sbt coverageReport
    # Extract coverage from report
    - REPORT=$(head -n 2 menger-app/target/scala-3.*.*/scoverage-report/scoverage.xml | tail -n 1 | xargs)
    - for word in $REPORT; do echo $word; done | grep rate | tr - _ > coverage.log
    - . coverage.log
    # Report current vs previous coverage
    - echo "=== Coverage Report ==="
    - echo "Statement coverage - current:${statement_rate}% previous:${statement_rate_old}%"
    - echo "Branch coverage - current:${branch_rate}% previous:${branch_rate_old}%"
    # Check absolute floor - always fail if below this
    - |
      if [ $(echo "$statement_rate < $COVERAGE_FLOOR" | bc -l) -eq 1 ]; then
        echo "ERROR: Statement coverage ${statement_rate}% is below absolute minimum ${COVERAGE_FLOOR}%"
        exit 1
      fi
    # Check for coverage drop
    - |
      COVERAGE_DROP=$(echo "$statement_rate_old - $statement_rate" | bc -l)
      if [ $(echo "$COVERAGE_DROP > $COVERAGE_DROP_THRESHOLD" | bc -l) -eq 1 ]; then
        echo "WARNING: Coverage dropped by ${COVERAGE_DROP}% (threshold: ${COVERAGE_DROP_THRESHOLD}%)"
        if [ $(echo "$statement_rate < $COVERAGE_MIN" | bc -l) -eq 1 ]; then
          echo "ERROR: Coverage ${statement_rate}% is below minimum ${COVERAGE_MIN}%"
          exit 1
        else
          echo "Coverage still above ${COVERAGE_MIN}%, continuing..."
        fi
      fi
    # Warn about branch coverage drop (informational only)
    - |
      if [ $(echo "$branch_rate_old > $branch_rate" | bc -l) -eq 1 ]; then
        echo "INFO: Branch coverage decreased from ${branch_rate_old}% to ${branch_rate}%"
      fi
    - echo "=== Coverage check passed ==="
  artifacts:
    when: always
    reports:
      junit: menger-app/target/test-reports/**/TEST-*.xml
    paths:
      - coverage.log
      - menger-app/target/scala-${SCALA_VERSION}/scoverage-report/

Scalafix:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: check
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH
  before_script:
    - apt-get -y update
    - apt-get -y install --no-install-recommends $LIBAV_DEV_PACKAGES
  script:
    # Scalafix only checks Scala code style, no GPU needed
    - sbt "scalafix --check"
  allow_failure: false

sonarcloud-check:
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  rules:
    - if: "$SONAR_TOKEN"
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner

pages:coverage:
  image: ubuntu:latest
  stage: package
  needs:
    - CheckCoverage
    - job: ScalaVersionConsistent
      optional: true
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
  script:
    - mv menger-app/target/scala-${SCALA_VERSION}/scoverage-report/ coverage-report/
  artifacts:
    paths:
      - coverage-report

pages:
  image: python:3.12-slim
  stage: package
  needs:
    - job: CheckCoverage
      artifacts: true
      optional: true
    - job: ScalaVersionConsistent
      optional: true
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - pip install mkdocs-material --quiet
    - mkdocs build --config-file docs/website/mkdocs.yml --site-dir public
    - mkdir -p public/coverage
    - mv menger-app/target/scala-${SCALA_VERSION}/scoverage-report/* public/coverage/ 2>/dev/null || echo "No coverage report (expected on main branch)"
  artifacts:
    paths:
      - public

Run:UseDocker:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  timeout: 20m
  tags:
    - nvidia
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.scala"
        - "**/*.sbt"
        - "**/*.cpp"
        - "**/*.cu"
        - "**/*.cuh"
        - "**/*.h"
        - "**/CMakeLists.txt"
        - ".gitlab-ci.yml"
        - "scripts/integration-tests.sh"
        - "project/**/*"
  before_script:
    - nvidia-smi
    - apt-get -y update
    - apt-get -y install --no-install-recommends mesa-utils x11-xserver-utils xvfb $LIBAV_DEV_PACKAGES
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    # Smoke-test each sponge type via --objects (OptiX renderer)
    - xvfb-run -a sbt "mengerApp / run --objects type=cube-sponge:level=1 --timeout 0.1"
    - xvfb-run -a sbt "mengerApp / run --objects type=sponge-volume:level=1 --timeout 0.1"
    - xvfb-run -a sbt "mengerApp / run --objects type=sponge-volume:level=2 --timeout 0.1"
    - xvfb-run -a sbt "mengerApp / run --objects type=tesseract --timeout 0.1"
    - xvfb-run -a sbt "mengerApp / run --objects type=tesseract-sponge-volume:level=1 --timeout 0.1"
    - xvfb-run -a sbt "mengerApp / run --objects type=tesseract-sponge-surface:level=2 --timeout 0.1"
    # Animation: DSL scene with t-parameter, 5 frames
    - xvfb-run -a sbt "mengerApp / run --scene examples.dsl.PulsingSponge --frames 5 --start-t 0 --end-t 2 --headless --save-name menger%04d.png"
    - test -f menger0000.png
    - test -f menger0004.png
    # Type compatibility loop
    - for TYPE in cube-sponge sponge-volume tesseract-sponge-volume tesseract-sponge-surface; do xvfb-run -a sbt "mengerApp / run --objects type=$TYPE:level=1 --timeout 0.1" || exit 1; done


CheckRunTime:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  timeout: 20m
  tags:
    - nvidia
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.scala"
        - "**/*.sbt"
        - "**/*.cpp"
        - "**/*.cu"
        - "**/*.cuh"
        - "**/*.h"
        - "**/CMakeLists.txt"
        - ".gitlab-ci.yml"
        - "scripts/integration-tests.sh"
        - "project/**/*"
  before_script:
    - nvidia-smi
    - apt-get -y update
    - apt-get -y install --no-install-recommends bc time mesa-utils x11-xserver-utils xvfb $LIBAV_DEV_PACKAGES
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    - sbt compile
    # Test if OPTIX_ROOT is needed for running (unset to check)
    - unset OPTIX_ROOT
    - /usr/bin/time -f %U -o runtime.log xvfb-run sbt "mengerApp / run --objects type=sponge-volume:level=1 --timeout 0.1"
    - echo "$(<runtime.log) > $TEST_RUN_MAX_RUNNING_TIME"
    - if [ $(echo "$(<runtime.log) > $TEST_RUN_MAX_RUNNING_TIME" | bc -l) -eq 1 ]; then exit 1; fi
  artifacts:
    paths:
      - runtime.log

# Native memory-leak gate: runs Valgrind (CPU) and compute-sanitizer (GPU)
# on menger-geometry native code. Advisory (allow_failure); signals leaks
# without blocking unrelated MRs. Requires nvidia runner + valgrind.
NativeLeakCheck:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: test
  resource_group: nvidia-gpu
  timeout: 20m
  tags:
    - nvidia
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    __GL_THREADED_OPTIMIZATIONS: "0"
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      changes:
        - "**/*.cpp"
        - "**/*.cu"
        - "**/*.cuh"
        - "**/*.h"
        - "**/CMakeLists.txt"
        - ".gitlab-ci.yml"
  allow_failure: true
  before_script:
    - nvidia-smi
    - apt-get -y update
    - apt-get -y install --no-install-recommends valgrind mesa-utils x11-xserver-utils xvfb $LIBAV_DEV_PACKAGES
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && \
         [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* \
               /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    # Phase 1: Build native library + run menger-geometry test suite
    - sbt compile
    # Phase 2: Valgrind on menger-geometry tests (CPU leak detection)
    - |
      echo "=== Valgrind (CPU leak check) ==="
      valgrind \
        --leak-check=full \
        --error-exitcode=1 \
        --errors-for-leak-kinds=definite,possible \
        --suppressions=valgrind-suppressions.txt \
        --log-file=/tmp/valgrind-ci.log \
        xvfb-run -a sbt "mengerGeometry / test" --warn || {
          echo "Valgrind found leaks — see /tmp/valgrind-ci.log"
          cat /tmp/valgrind-ci.log
        }
    # Phase 3: compute-sanitizer on menger-geometry tests (GPU leak detection)
    - |
      echo "=== compute-sanitizer (GPU leak check) ==="
      compute-sanitizer \
        --leak-check full \
        --error-exitcode 1 \
        xvfb-run -a sbt "mengerGeometry / test" --warn || {
          echo "compute-sanitizer found GPU leaks"
        }
  artifacts:
    when: always
    paths:
      - /tmp/valgrind-ci.log
    expire_in: 7 days

# Sprint 28.4: AI code review by Claude + DeepSeek on every MR.
# Advisory (allow_failure); posts findings as a bot note on the MR.
# Skip with the 'skip-review' MR label for draft/WIP branches.
# DeepSeek key: DEEPSEEK_API_KEY (masked, protected CI variable — see arc42 §11).
AIReview:
  stage: review
  image: ubuntu:latest
  needs: []
  timeout: 10m
  allow_failure: true
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      when: always
  before_script:
    - apt-get -y update -qq
    - apt-get -y install -qq curl jq python3 git ca-certificates
  script:
    # Skip if MR carries the 'skip-review' label
    - |
      if echo "${CI_MERGE_REQUEST_LABELS:-}" | tr ',' '\n' | grep -qx 'skip-review'; then
        echo "skip-review label set; skipping AI review"
        exit 0
      fi
    # Generate diff against the target branch
    - git fetch --quiet origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    - git diff "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD" > mr.diff
    - DIFF_LINES=$(wc -l < mr.diff)
    - echo "Diff is ${DIFF_LINES} lines"
    # Detect whether architecture-relevant paths are touched
    - |
      ARCH_FLAG=""
      if [ -f standards/architecture-paths.txt ]; then
        while IFS= read -r pattern; do
          case "$pattern" in '#'*|'') continue ;; esac
          if git diff --name-only "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD" \
              | grep -qE "$pattern"; then
            ARCH_FLAG="--arch-guidelines standards/architecture-review-guidelines.md"
            echo "Architecture-relevant paths changed; adding arch review"
            break
          fi
        done < standards/architecture-paths.txt
      fi
    - >
      ./scripts/review.sh
      --diff mr.diff
      --guidelines standards/review-guidelines.md
      ${ARCH_FLAG}
      --output review-findings.json
    # Post findings to the MR
    - ./scripts/adapters/gitlab-mr-review.sh review-findings.json
  artifacts:
    when: always
    paths:
      - review-findings.json
    expire_in: 7 days

# Sprint 28.7: performance-regression guard.
# Runs 4 benchmark scenes 3 times each, computes median frameMs, compares
# against scripts/perf-baseline.json. >15% regression fails.
# Run benchmark.sh --update-baseline after intentional performance changes.
PerfCheck:
  stage: test built
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  needs:
    - job: BuildDeployable
      artifacts: true
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
  resource_group: nvidia-gpu
  timeout: 25m
  tags:
    - nvidia
  variables:
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    __GL_THREADED_OPTIMIZATIONS: "0"
  allow_failure: true
  before_script:
    - apt-get -y update -qq
    - apt-get -y install -qq mesa-utils x11-xserver-utils xvfb python3 $LIBAV_DEV_PACKAGES
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && \
         [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* \
               /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    - unzip -oq menger-${DEPLOYABLE_VERSION}.zip
    - export LD_LIBRARY_PATH=/usr/local/cuda/lib64
    - ./scripts/benchmark.sh "./menger-app-${DEPLOYABLE_VERSION}/bin/menger-app"
  artifacts:
    when: always
    paths:
      - perf-results.json
    expire_in: 30 days

# Sprint 28.1: this repo's copies of shared standards files must match the
# canonical versions in standards/ (see standards/README.md).
StandardsParity:
  stage: preconditions
  image: ubuntu:latest
  needs: []
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
    - if: $CI_COMMIT_BRANCH
  script:
    - ./scripts/check-standards-drift.sh --local

# Sprint 28.3: runner heartbeat — a trivial scheduled job; if no local runner
# picks it up the scheduled pipeline fails visibly (pipeline-failure email is
# the alert). Inert until the nightly schedule exists (end of Sprint 28).
RunnerHeartbeat:
  stage: preconditions
  image: ubuntu:latest
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - echo "runner alive on $(hostname) at $(date -u)"

# Sprint 28.1: scheduled cross-repo drift detection — the GitHub sibling repos
# (menger-common, optix-jni) must carry byte-identical standards files.
# Fails loudly on divergence; opens an issue when GITLAB_API_TOKEN is set.
StandardsDrift:
  stage: preconditions
  image: ubuntu:latest
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - apt-get -y update
    - apt-get -y install curl ca-certificates
  script:
    - ./scripts/check-standards-drift.sh --remote

# Sprint 28.8: dependency-update automation via Renovate.
# Requires RENOVATE_TOKEN (GitLab PAT, api+read_api scope) as a masked
# CI variable. GITHUB_COM_TOKEN optional (improves changelog lookups).
# Runs on schedule (weekly) and can be triggered manually or at sprint close.
# For GitHub repos, install the Renovate GitHub App and add renovate.json.
Renovate:
  stage: preconditions
  image: renovate/renovate:latest
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: $CI_API_V4_URL
    RENOVATE_GIT_AUTHOR: "Renovate Bot <bot@renovateapp.com>"
    LOG_LEVEL: info
  script:
    - |
      if [ -z "${RENOVATE_TOKEN:-}" ]; then
        echo "RENOVATE_TOKEN not set; skipping Renovate run"
        exit 0
      fi
    - renovate $CI_PROJECT_PATH

TagIsNewAndConsistent:
  stage: preconditions
  image: ubuntu:latest
  rules:
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//'
      when: never
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_TITLE =~ /#norelease/'
      when: never
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_LABELS =~ /NORELEASE/'
      when: never
    - if: "$CI_MERGE_REQUEST_ID"
  before_script:
    - apt-get -y update
    - apt-get -y install git
  script:
    - VERSION_SBT=$(egrep 'version := ".*"' menger-app/build.sbt | cut -d \" -f 2)
    - test -n "$VERSION_SBT"
    - echo $VERSION_SBT
    - VERSIONS_CI=$(egrep 'DEPLOYABLE_VERSION.*' .gitlab-ci.yml | head -n 1 | cut -d ':' -f 2 | xargs)
    - test -n "$VERSIONS_CI"
    - echo $VERSIONS_CI
    - test "$VERSION_SBT" = "$VERSIONS_CI"
    - VERSION_USERGUIDE=$(grep '^\*\*Version\*\*:' docs/USER_GUIDE.md | cut -d ' ' -f 2)
    - test -n "$VERSION_USERGUIDE"
    - echo $VERSION_USERGUIDE
    - test "$VERSION_SBT" = "$VERSION_USERGUIDE"
    - git tag | ( ! grep "^${VERSION_SBT}\$" )

ScalaVersionConsistent:
  stage: preconditions
  image: ubuntu:latest
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
  script:
    - SCALA_VERSION=$(egrep 'scalaVersion := ".*"' menger-app/build.sbt | cut -d \" -f 2 | xargs) || true
    - >
      GITLAB_SCALA_VERSION=$(egrep 'SCALA_VERSION. .*' .gitlab-ci.yml | head -n 1 | cut -d: -f 2 | xargs) || true
    - if [ "$SCALA_VERSION" = "$GITLAB_SCALA_VERSION" ]
    - then
    - echo "Scala version \"${SCALA_VERSION}\""
    - else
    - echo "Scala in build.sbt \"${SCALA_VERSION}\", in .gitlab-ci.yml \"${GITLAB_SCALA_VERSION}\""
    - exit 1
    - fi

ChangelogIsUpdated:
  stage: preconditions
  image: ubuntu:latest
  rules:
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//'
      when: never
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_TITLE =~ /#norelease/'
      when: never
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_LABELS =~ /NORELEASE/'
      when: never
    - if: "$CI_MERGE_REQUEST_ID"
  script:
    - test -f CHANGELOG.md || exit 0
    - VERSION=$(egrep 'version := ".*"' menger-app/build.sbt | cut -d \" -f 2)
    - test -n "$VERSION"
    - fgrep "## [$VERSION]" CHANGELOG.md
    - fgrep "...$VERSION" CHANGELOG.md
    - echo $CI_MERGE_REQUEST_TITLE | grep '^Draft:\|^WIP:' ||
      fgrep "## [$VERSION] - $(date +%Y-%m-%d)" CHANGELOG.md

BuildDeployable:
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  stage: build
  needs: ["Scalafix"]
  timeout: 20m
  retry: 2
  rules:
    - if: "$CI_MERGE_REQUEST_ID"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  script:
    # Build deployable package with full OptiX JNI
    - apt-get -y update
    - apt-get -y install --no-install-recommends $LIBAV_DEV_PACKAGES
    - sbt "mengerApp / Universal / packageBin"
    - mv menger-app/target/universal/${DEPLOYABLE_BASE_NAME}-app-${DEPLOYABLE_VERSION}.zip ./${DEPLOYABLE_BASE_NAME}-${DEPLOYABLE_VERSION}.zip
    - ls -lh menger-*.*.*.zip
  artifacts:
    paths:
      - menger-*.*.*.zip

# Creates GitLab release AND tag in one job.
# Checks the MR title via the GitLab API: if it contains #norelease, the release
# is skipped (no tag created, no downstream tag pipeline). This works with
# fast-forward merges where the MR title never appears in any commit message.
# Triggers a tag pipeline where Upload, PushToGithub, and CreateGithubRelease run.
CreateRelease:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: BuildDeployable
      artifacts: true
  rules:
    # Don't run on tag pipeline (would duplicate the release)
    - if: $CI_COMMIT_TAG
      when: never
    # Run on main branch after MR merge
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"
  before_script:
    - apk add --quiet curl jq
  script:
    - |
      MR_DATA=$(curl --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/merge_requests")
      MR_TITLE=$(echo "$MR_DATA"  | jq -r 'if type == "array" then (.[0].title  // "") else "" end')
      MR_LABELS=$(echo "$MR_DATA" | jq -r 'if type == "array" then (.[0].labels // [] | join(",")) else "" end')
      echo "MR title: ${MR_TITLE}"
      echo "MR labels: ${MR_LABELS}"
      if echo "${MR_TITLE}" | grep -q '#norelease' || \
         echo ",${MR_LABELS}," | grep -qi ',NORELEASE,'; then
        echo "Skipping release (NORELEASE label or #norelease in MR title)"
      else
        echo "Creating release for version ${DEPLOYABLE_VERSION}"
        release-cli create \
          --name "Release ${DEPLOYABLE_VERSION}" \
          --description "Released ${DEPLOYABLE_VERSION}" \
          --tag-name "${DEPLOYABLE_VERSION}" \
          --ref "${CI_COMMIT_SHA}"
      fi

# Sprint 28.5: install-and-render proof on a real tagged release.
# Downloads the packaged zip (from BuildDeployable artifact), unzips, and runs
# a headless smoke render via the installed binary — proving the package actually
# works on the target hardware from start to finish.
Test:InstallSmoke:
  stage: release
  image: $CI_REGISTRY_IMAGE/optix-cuda:$OPTIX_DOCKER_VERSION
  needs:
    - job: BuildDeployable
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  resource_group: nvidia-gpu
  timeout: 10m
  tags:
    - nvidia
  variables:
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    __GL_THREADED_OPTIMIZATIONS: "0"
  before_script:
    - apt-get -y update -qq
    - apt-get -y install -qq mesa-utils x11-xserver-utils xvfb $LIBAV_DEV_PACKAGES
    - |
      if [ -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* ] && \
         [ ! -f /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1 ]; then
        ln -sf /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.* \
               /usr/lib/x86_64-linux-gnu/libnvidia-rtcore.so.1
      fi
    - ldconfig || true
  script:
    - ls -lh menger-*.*.*.zip
    - unzip -oq menger-${DEPLOYABLE_VERSION}.zip
    - export LD_LIBRARY_PATH=/usr/local/cuda/lib64
    - 'echo "=== smoke render: cube-sponge level 1 ==="'
    - xvfb-run -a ./menger-app-${DEPLOYABLE_VERSION}/bin/menger-app --objects type=cube-sponge:level=1 --timeout 0.1
    - 'echo "=== smoke render: passed ==="'

Upload:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: BuildDeployable
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true
  before_script:
    - apk update
    - apk add curl
  script:
    - export DEPLOYABLE_ZIP_FILE=${DEPLOYABLE_BASE_NAME}-${DEPLOYABLE_VERSION}.zip
    - echo curl --header "JOB-TOKEN $CI_JOB_TOKEN" --upload-file ${DEPLOYABLE_ZIP_FILE} "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DEPLOYABLE_ZIP_FILE}"
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file ${DEPLOYABLE_ZIP_FILE} "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DEPLOYABLE_ZIP_FILE}"'

PushToGithub:
  stage: release
  image: alpine:latest
  variables:
    # CRITICAL: Must fetch complete history (not shallow clone) because:
    # - GitHub mirror may have older commits from previous releases
    # - Git needs to send complete object graph when pushing
    # - Shallow clone causes "did not receive expected object" errors
    GIT_DEPTH: "0"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  needs:
    - BuildDeployable
    - Test:InstallSmoke
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - apk update
    - apk add openssh-client git sshpass
    - eval $(ssh-agent -s)
    - echo "$GITHUB_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh -T git@github.com 2>&1 || true
    - git config user.email "${GITLAB_USER_EMAIL}"
    - git config user.name "${GITLAB_USER_NAME}"
    - git config pull.rebase true
  script:
    # Add or update GitHub remote
    - git remote add github git@github.com:lene/menger.git 2>/dev/null || git remote set-url github git@github.com:lene/menger.git
    - git remote show github
    # Fetch all from GitLab origin
    - git fetch origin --tags
    # In tag pipeline CI_COMMIT_BRANCH is empty; fall back to main
    - BRANCH=${CI_COMMIT_BRANCH:-main}
    - echo "Target branch - $BRANCH"
    - echo "Current commit - ${CI_COMMIT_SHA}"
    - echo "Tag - ${CI_COMMIT_TAG}"
    # Push SHA directly to avoid 'branch used by worktree' error from local branch manipulation
    - git push --force github ${CI_COMMIT_SHA}:refs/heads/$BRANCH
    - git push --force github $CI_COMMIT_TAG

CreateGithubRelease:
  stage: release
  needs:
    - PushToGithub
  image: alpine:latest
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
  allow_failure: true
  before_script:
    - apk update
    - apk add curl
  variables:
    RELEASE_API_URL: "https://api.github.com/repos/lene/menger/releases"
    DESCRIPTION: "Full Changelog: https://github.com/lene/menger/blob/${CI_COMMIT_TAG}/CHANGELOG.md"
  script:
    - POST_DATA='{
      "tag_name":"'${CI_COMMIT_TAG}'",
      "target_commitish":"main",
      "name":"'${CI_COMMIT_TAG}'",
      "body":"'${FULL_DESCRIPTION}${DESCRIPTION}'",
      "draft":false,
      "prerelease":false,
      "generate_release_notes":false
      }'
    - echo $API_URL
    - echo $POST_DATA
    - 'curl -L -X POST 
         -H "Accept: application/vnd.github+json" 
         -H "X-GitHub-Api-Version: 2022-11-28" 
         -H "Authorization: Bearer ${GITHUB_API_TOKEN}"
         ${RELEASE_API_URL} -d "${POST_DATA}"'
